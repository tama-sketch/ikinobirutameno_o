  const imgEl = document.getElementById("slideshow-image");
  let current = 0;

  // --- Web Audio API ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // --- 音階（C3〜C6） ---
  const notes = [
    130.81,138.59,146.83,155.56,164.81,174.61,185.00,196.00,207.65,220.00,233.08,246.94,
    261.63,277.18,293.66,311.13,329.63,349.23,369.99,392.00,415.30,440.00,466.16,493.88,
    523.25,554.37,587.33,622.25,659.25,698.46,739.99,783.99,830.61,880.00,932.33,987.77,
    1046.50
  ];

  const waveTypes = ['sine', 'square', 'triangle'];

  // --- 短い音 ---
  function playShortTone() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const freq = notes[Math.floor(Math.random() * notes.length)];
    const wave = waveTypes[Math.floor(Math.random() * waveTypes.length)];

    osc.type = wave;
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    gain.gain.setValueAtTime(0.15, now);
    gain.gain.linearRampToValueAtTime(0, now + 1.2);

    osc.start(now);
    osc.stop(now + 1.2);
  }

  // --- 長い音 ---
  function playLongTone() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const freq = notes[Math.floor(Math.random() * notes.length)];
    const wave = waveTypes[Math.floor(Math.random() * waveTypes.length)];

    osc.type = wave;
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    gain.gain.setValueAtTime(0.12, now);
    gain.gain.linearRampToValueAtTime(0.05, now + 0.2);
    gain.gain.linearRampToValueAtTime(0, now + 4.0);

    osc.start(now);
    osc.stop(now + 4.0);
  }

  // --- 画像切り替え ---
  function showRandomImage() {
    if (images.length <= 1) return;

    let nextIndex;
    do { nextIndex = Math.floor(Math.random() * images.length); }
    while (nextIndex === current);

    current = nextIndex;
    const filename = images[current];

    imgEl.onload = () => {
    // 画像が画面に描画されたタイミング

    // ▼ 鳴らさない画像なら何もしない
    if (silentImages.includes(filename)) return;

    // ▼ 短い音（毎回）
    playShortTone();

    // ▼ 特定画像なら長い音を鳴らす
    if (longToneImages.includes(filename)) {
      playLongTone();
    }
  };

  imgEl.src = filename;

    // ▼ インデックス指定したい場合はこちらでもOK
    // if (longToneImagesIndex.includes(current)) {
    //   playLongTone();
    // }
  }

  // --- Safari 初回タップで Audio 解禁 ---
  window.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    showRandomImage();
  }, { once: true });

  // --- 画像切り替えスケジュール ---
  function scheduleNextImage() {
    const interval = 600 + Math.random() * 1200;
    setTimeout(() => {
      showRandomImage();
      scheduleNextImage();
    }, interval);
  }

  scheduleNextImage();
